<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desert Strike - Commercial Edition</title>
    <link rel="stylesheet" href="./style.css" />
    <!-- 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="game-container">
      <canvas id="gameCanvas" width="1280" height="720"></canvas>
      
      <!-- Title Screen -->
      <div id="title-screen">
        <div class="logo-container">
          <h1 class="main-title">DESERT<br>STRIKE</h1>
          <h2 class="sub-title">COMMERCIAL EDITION</h2>
        </div>
        <button id="start-btn" class="glow-btn">START GAME</button>
        <div class="credits">Developed by Antigravity</div>
      </div>
      
      <!-- Tooltip -->
      <div id="tooltip" class="tooltip hidden">
        <div id="tooltip-title" class="tt-title"></div>
        <div id="tooltip-desc" class="tt-desc"></div>
        <div class="tt-stats">
          <div class="tt-stat"><span class="icon">♥</span><span id="tt-hp"></span></div>
          <div class="tt-stat"><span class="icon">⚔</span><span id="tt-dmg"></span></div>
          <div class="tt-stat"><span class="icon">⌖</span><span id="tt-range"></span></div>
        </div>
      </div>
      
      <!-- Cheat Menu (Test Mode) -->
    <div id="cheat-menu" class="cheat-panel">
      <span class="cheat-title">TEST CHEATS:</span>
      <button class="cheat-btn" data-speed="1">1x</button>
      <button class="cheat-btn" data-speed="2">2x</button>
      <button class="cheat-btn" data-speed="3">3x</button>
      <button class="cheat-btn" id="cheat-money-btn">💰 미네랄 +10000</button>
    </div>

    <!-- UI Layer -->
      <div id="ui-layer">
        
        <!-- Top HUD -->
        <div class="hud-top">
          <div class="base-health left">
            <span class="label">아군 본진 (PLAYER BASE)</span>
            <div class="health-bar-container">
              <div id="player-health-bar" class="health-bar fill"></div>
            </div>
            <span id="player-health-text" class="health-text">5000 / 5000</span>
          </div>
          
          <div class="wave-timer">
            <span class="label">다음 웨이브 (NEXT WAVE)</span>
            <span id="timer-text" class="time">15.0</span>
          </div>
          
          <div class="base-health right">
            <span class="label">적군 본진 (ENEMY BASE)</span>
            <div class="health-bar-container">
              <div id="enemy-health-bar" class="health-bar fill"></div>
            </div>
            <span id="enemy-health-text" class="health-text">5000 / 5000</span>
          </div>
        </div>

        <!-- Economy HUD (Left Side) -->
        <div class="hud-economy">
          <div class="resource-box">
            <span class="label">미네랄 (MINERALS)</span>
            <div class="value-row">
              <div class="mineral-icon"></div>
              <span id="minerals-text" class="value">150</span>
            </div>
          </div>
          <div class="resource-box income-box">
            <span class="label">인컴 (INCOME)</span>
            <span id="income-text" class="value">+50 / wave</span>
          </div>
          <div class="hero-instruction" style="margin-top:20px; font-size:12px; color:#f1c40f; text-shadow:0 0 5px #000; font-weight:bold;">
            [A] / [D] 키로 카메라 이동 (전장 탐색)
          </div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls">
          <!-- Building Menu -->
          <div class="panel build-menu">
            <div class="menu-title">유닛 생산 (CONSTRUCT UNITS)</div>
            <div class="build-buttons">
              <button class="build-btn" data-type="melee" data-cost="50">
                <div class="icon melee-icon"></div>
                <div class="info">
                  <span class="name">근접 유닛 (질럿)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 50</span>
                </div>
              </button>
              <button class="build-btn" data-type="ranged" data-cost="100">
                <div class="icon ranged-icon"></div>
                <div class="info">
                  <span class="name">원거리 유닛 (마린)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 100</span>
                </div>
              </button>
              <button class="build-btn" data-type="tank" data-cost="200">
                <div class="icon tank-icon"></div>
                <div class="info">
                  <span class="name">헤비 탱크 (골리앗)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 200</span>
                </div>
              </button>
            </div>
          </div>
          
          <!-- Economy Menu -->
          <div class="panel economy-menu">
            <div class="menu-title">경제 & 시대발전 (TECH)</div>
            <div class="build-buttons">
              <button class="build-btn income-btn" data-type="income" data-cost="150">
                <div class="icon income-icon"></div>
                <div class="info">
                  <span class="name">가스 채취기 (+10)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 150</span>
                </div>
              </button>
              <button class="build-btn tech-btn" data-type="tech" data-cost="800">
                <div class="icon tech-icon"></div>
                <div class="info">
                  <span class="name">시대 발전 (Tech)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 800</span>
                </div>
              </button>
            </div>
          </div>
          
          <!-- Special Menu -->
          <div class="panel special-menu">
            <div class="menu-title">특수 능력 (SPECIAL)</div>
            <div class="build-buttons">
              <button class="build-btn ultimate-btn" data-type="ultimate" data-cost="500">
                <div class="icon ultimate-icon"></div>
                <div class="info">
                  <span class="name">궤도 폭격 (광역기)</span>
                  <span class="cost"><div class="mineral-icon small"></div> 500</span>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Game Over Screen -->
      <div id="game-over-screen" class="hidden">
        <h1 id="game-over-title">승리!</h1>
        <button id="restart-btn">다시 플레이</button>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
